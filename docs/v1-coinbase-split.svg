<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">V1 Block Reward Distribution</title>
  <desc id="desc">Pie chart showing V1 block reward distribution by category.</desc>

  <rect width="800" height="500" fill="#0F172A" />

  <text x="400" y="56" fill="#FFFFFF" font-family="sans-serif" font-size="32" font-weight="700" text-anchor="middle">
    V1 Block Reward Distribution
  </text>

  <!-- Pie chart -->
  <g>
    <circle cx="220" cy="250" r="150" fill="#1E293B" />

    <!-- 40% Growth Fund -->
    <path d="M 220 250 L 220 100 A 150 150 0 0 1 308.17 371.35 Z" fill="#22C55E" />

    <!-- 20% Miners -->
    <path d="M 220 250 L 308.17 371.35 A 150 150 0 0 1 131.83 371.35 Z" fill="#7C3AED" />

    <!-- 20% Masternodes -->
    <path d="M 220 250 L 131.83 371.35 A 150 150 0 0 1 77.34 203.65 Z" fill="#6366F1" />

    <!-- 15% Treasury -->
    <path d="M 220 250 L 77.34 203.65 A 150 150 0 0 1 173.65 107.34 Z" fill="#3B82F6" />

    <!-- 5% Dev Fund -->
    <path d="M 220 250 L 173.65 107.34 A 150 150 0 0 1 220 100 Z" fill="#14B8A6" />

    <circle cx="220" cy="250" r="150" fill="none" stroke="#334155" stroke-width="1" />
  </g>

  <!-- Legend -->
  <g font-family="sans-serif" font-size="24" fill="#FFFFFF">
    <rect x="470" y="150" width="22" height="22" rx="4" fill="#22C55E" />
    <text x="508" y="168">Growth Fund (40%)</text>

    <rect x="470" y="195" width="22" height="22" rx="4" fill="#7C3AED" />
    <text x="508" y="213">Miners (20%)</text>

    <rect x="470" y="240" width="22" height="22" rx="4" fill="#6366F1" />
    <text x="508" y="258">Masternodes (20%)</text>

    <rect x="470" y="285" width="22" height="22" rx="4" fill="#3B82F6" />
    <text x="508" y="303">Treasury (15%)</text>

    <rect x="470" y="330" width="22" height="22" rx="4" fill="#14B8A6" />
    <text x="508" y="348">Dev Fund (5%)</text>
  </g>
</svg>
